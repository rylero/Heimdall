services:
  heimdall:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    runtime: nvidia
    privileged: true
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - GST_PLUGIN_PATH=/usr/local/lib/gstreamer-1.0-host
      - LD_LIBRARY_PATH=/usr/lib/aarch64-linux-gnu/tegra:/usr/local/cuda/lib64
    volumes:
      - ../models:/app/models
      - ../config:/app/config
      - heimdall-data:/app/data
      - /usr/lib/aarch64-linux-gnu/gstreamer-1.0:/usr/local/lib/gstreamer-1.0-host:ro
      - /usr/lib/aarch64-linux-gnu/libx264.so.163:/usr/lib/aarch64-linux-gnu/libx264.so.163:ro
    network_mode: host

  heimdall-web:
    build:
      context: ../web
      dockerfile: Dockerfile
    network_mode: host
    volumes:
      - ../models:/app/models
      - heimdall-data:/app/data
    devices:
      - /dev/video0:/dev/video0
      - /dev/video1:/dev/video1
    restart: unless-stopped

volumes:
  heimdall-data:
