services:
  heimdall:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - ../models:/app/models
      - ../config:/app/config
      - heimdall-data:/app/data
    devices:
      - /dev/video0:/dev/video0
      - /dev/video1:/dev/video1
    network_mode: host

  heimdall-web:
    build:
      context: ../web
      dockerfile: Dockerfile
    network_mode: host
    volumes:
      - ../models:/app/models
      - heimdall-data:/app/data
    devices:
      - /dev/video0:/dev/video0
      - /dev/video1:/dev/video1
    restart: unless-stopped

volumes:
  heimdall-data:
